kind = "mobile"
previewPath = "/"
title = "ReelsGuard"
version = "1.0.0"
id = "artifacts/reels-guard"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20283

[services.development]
run = "pnpm --filter @workspace/reels-guard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reels-guard", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/reels-guard", "run", "serve" ]

[services.env]
PORT = "20283"
BASE_PATH = "/"
